<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Admin PDAM</title>
  <link rel="stylesheet" href="/admin-assets/admin.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <div class="brand-badge">PDAM</div>
    <h1>Login Admin</h1>
    <p>Masuk untuk mengontrol berita dan pengumuman pelanggan.</p>

    <form id="loginForm">
      <label>
        Username
        <input name="username" autocomplete="username" placeholder="admin" required />
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </label>
      <button type="submit">Masuk Dashboard</button>
      <p class="message" id="loginMessage" role="alert"></p>
    </form>

    <a class="back-link" href="/">← Kembali ke halaman pelanggan</a>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('loginMessage');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = 'Memproses login...';
      message.className = 'message';
      const payload = Object.fromEntries(new FormData(form).entries());
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login gagal.');
        window.location.href = '/admin/dashboard';
      } catch (error) {
        message.textContent = error.message;
        message.className = 'message error';
      }
    });
  </script>
</body>
</html>
